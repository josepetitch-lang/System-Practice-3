<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Protocolo de Comunicación v1.0</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="terminal">
        <header>
            <h1>SISTEMA DE COMUNICACIÓN EN TIEMPO REAL</h1>
        </header>

        <div id="chat-historial"></div>

        <div class="input-area">
            <input type="text" id="mensajeInput" placeholder="> Ingrese datos para transmisión...">
            <button onclick="enviarMensaje()">TRANSMITIR</button>
        </div>

      <div id="seccion-preguntas" style="margin-top: 20px; border: 1px solid #00ff41; padding: 15px;">
          <h3>ANÁLISIS DE DATOS (TEST)</h3>
    
          <button onclick="iniciarTest()" style="background: #00ff41; color: #0a0e14; border: none; padding: 5px 10px; cursor: pointer; margin-bottom: 10px;">SIGUIENTE</button>
    
          <div id="pregunta-area" style="margin-bottom: 10px;">Haz clic en 'Siguiente' para iniciar.</div>
    
          <input type="text" id="respuestaInput" placeholder="> Tu respuesta aquí...">
          <button onclick="verificarRespuesta()" style="background: #00ff41; color: #0a0e14; border: none; padding: 5px 10px; cursor: pointer;">Enviar Respuesta</button>
      </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
